<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東京、富士山、輕井澤 8日自由行</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        #map { height: 100%; width: 100%; z-index: 10; }
        .timeline-container { position: relative; padding-left: 24px; }
        .timeline-line { position: absolute; left: 11px; top: 10px; bottom: 0; width: 2px; background-color: #e2e8f0; z-index: 1; }
        .timeline-dot { position: absolute; left: -18px; top: 8px; width: 14px; height: 14px; border-radius: 50%; border: 3px solid white; z-index: 2; box-shadow: 0 0 0 1px #cbd5e1; }
        .itinerary-card { transition: all 0.2s ease; cursor: pointer; }
        .itinerary-card:hover { transform: translateX(5px); background-color: #f8fafc; }
        .itinerary-card.active { border-left: 4px solid; background-color: #eff6ff; }
        .leaflet-popup-content-wrapper { border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .leaflet-popup-content { margin: 12px; line-height: 1.5; }
        
        /* 登入畫面雙拼漸層背景特效 */
        .login-bg-container { position: absolute; inset: 0; background-color: #0f172a; z-index: 0; overflow: hidden; }
        .bg-fuji {
            position: absolute; inset: 0; width: 60%;
            background: url('https://images.unsplash.com/photo-1490806843957-31f4c9a91c65?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
            -webkit-mask-image: linear-gradient(to right, black 50%, transparent 100%);
            mask-image: linear-gradient(to right, black 50%, transparent 100%);
        }
        .bg-skytree {
            position: absolute; inset: 0; left: 40%; width: 60%;
            background: url('https://images.unsplash.com/photo-1536098561742-ca998e48cbcc?q=80&w=2036&auto=format&fit=crop') center/cover no-repeat;
            -webkit-mask-image: linear-gradient(to left, black 50%, transparent 100%);
            mask-image: linear-gradient(to left, black 50%, transparent 100%);
        }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden flex flex-col font-sans">

    <!-- 解密登入畫面 -->
    <div id="login-screen" class="absolute inset-0 z-50 flex items-center justify-center px-4">
        <!-- 背景漸層層 -->
        <div class="login-bg-container">
            <div class="bg-fuji"></div>
            <div class="bg-skytree"></div>
            <div class="absolute inset-0 bg-black/30"></div> <!-- 確保文字可視度 -->
        </div>
        
        <!-- 登入框 -->
        <div class="bg-white/95 backdrop-blur-md p-8 rounded-2xl shadow-2xl max-w-sm w-full border border-white/20 text-center relative z-10">
            <i class="fa-solid fa-map-location-dot text-4xl text-indigo-600 mb-4"></i>
            <h2 class="text-xl font-bold text-slate-800 mb-2">東京、富士山、輕井澤</h2>
            <h3 class="text-md font-semibold text-slate-600 mb-6">8日自由行</h3>
            <input type="password" id="unlock-pwd" placeholder="請輸入行程密碼" 
                   class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none mb-4 bg-white/80"
                   onkeypress="if(event.key === 'Enter') unlockApp()">
            <button onclick="unlockApp()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg">
                解鎖進入
            </button>
        </div>
    </div>

    <!-- 主程式畫面 (初始隱藏) -->
    <div id="app-screen" class="hidden h-full flex-col">
        <header class="bg-white shadow-sm z-20 px-4 py-3 flex justify-between items-center shrink-0">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-plane-departure text-blue-600 text-xl"></i>
                <h1 class="text-xl font-bold text-gray-800">東京、富士山、輕井澤 8日自由行</h1>
            </div>
            <div class="text-sm text-gray-500 hidden sm:block">6/25 - 7/2</div>
        </header>

        <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
            <div class="w-full md:w-5/12 lg:w-4/12 bg-white flex flex-col h-[50vh] md:h-full border-r border-gray-200 shrink-0 z-20 shadow-md">
                <div class="p-3 bg-gray-50 border-b overflow-x-auto whitespace-nowrap hide-scrollbar flex gap-2 shrink-0" id="day-selector"></div>
                <div class="flex-1 overflow-y-auto p-4" id="itinerary-list"></div>
            </div>
            <div class="w-full md:w-7/12 lg:w-8/12 h-[50vh] md:h-full bg-gray-200 relative z-10">
                <div id="map"></div>
            </div>
        </div>
    </div>

        let tripData = [];
        let map, markersGroup, polyline;
        let activeDayIndex = 0;

        function unlockApp() {
            const pwd = document.getElementById('unlock-pwd').value;
            try {
                const bytes = CryptoJS.AES.decrypt(ENCRYPTED_PAYLOAD, pwd);
                const decryptedStr = bytes.toString(CryptoJS.enc.Utf8);
                if (!decryptedStr) throw new Error("解密字串為空");
                
                tripData = JSON.parse(decryptedStr);
                
                document.getElementById('login-screen').remove();
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('flex');
                
                initMap();
                selectDay(0);
            } catch (error) {
                alert("解密失敗！密碼錯誤。");
            }
        }

        function initMap() {
            map = L.map('map').setView([35.682, 139.753], 9);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap contributors', maxZoom: 19
            }).addTo(map);
            markersGroup = L.featureGroup().addTo(map);
            setTimeout(() => map.invalidateSize(), 150);
        }

        function renderDaySelector() {
            const container = document.getElementById('day-selector');
            container.innerHTML = '';
            tripData.forEach((dayInfo, index) => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 text-sm font-medium rounded-full transition-all duration-200 ${index === activeDayIndex ? 'text-white shadow-md transform scale-105' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-100'}`;
                if (index === activeDayIndex) btn.style.backgroundColor = dayInfo.color;
                btn.innerHTML = `<span class="block text-xs md:text-sm font-bold">${dayInfo.day}</span>`;
                btn.onclick = () => selectDay(index);
                container.appendChild(btn);
            });
        }

        function renderItineraryAndMap(dayIndex) {
            const dayInfo = tripData[dayIndex];
            const listContainer = document.getElementById('itinerary-list');
            listContainer.innerHTML = '';
            markersGroup.clearLayers();
            if (polyline) map.removeLayer(polyline);
            
            const latlngs = [];

            dayInfo.events.forEach((event, i) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'timeline-container mb-6';
                
                let extraHtml = '';
                if(event.transport) extraHtml += `<span class="inline-block bg-blue-50 text-blue-600 text-xs px-2 py-1 rounded mr-2 mt-2 font-medium"><i class="fa-solid fa-route mr-1"></i>${event.transport}</span>`;
                if(event.phone) extraHtml += `<div class="text-xs text-gray-500 mt-2"><i class="fa-solid fa-phone mr-1"></i>${event.phone}</div>`;
                if(event.notes) extraHtml += `<div class="text-xs text-amber-700 bg-amber-50 p-2.5 rounded-lg mt-2 border border-amber-200 leading-relaxed"><i class="fa-solid fa-circle-info mr-1"></i>${event.notes}</div>`;
                
                if(event.links && event.links.length > 0) {
                    event.links.forEach(l => {
                        extraHtml += `<a href="${l.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 text-xs text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 border border-blue-200 rounded-md px-2.5 py-1.5 mt-2 mr-2 font-medium transition-colors" onclick="event.stopPropagation()"><i class="fa-solid fa-map-location-dot"></i> ${l.label}</a>`;
                    });
                }

                itemDiv.innerHTML = `
                    <div class="timeline-line"></div>
                    <div class="timeline-dot" style="border-color: ${dayInfo.color}; background-color: ${i === 0 ? dayInfo.color : 'white'}"></div>
                    <div class="itinerary-card bg-white border border-gray-150 p-4 rounded-xl shadow-sm hover:shadow-md" id="card-${i}" style="border-left-width: 4px; border-left-color: ${dayInfo.color}">
                        <div class="flex justify-between items-start gap-2">
                            <h3 class="font-bold text-gray-800 text-sm md:text-base leading-snug">${event.location}</h3>
                            <span class="text-xs font-semibold text-gray-600 bg-gray-100 px-2.5 py-1 rounded-full shrink-0">${event.time}</span>
                        </div>
                        <p class="text-sm text-gray-600 mt-2 leading-relaxed">${event.desc}</p>
                        <div class="flex flex-wrap items-center">${extraHtml}</div>
                    </div>
                `;

                if (event.coords && event.coords.length === 2) {
                    latlngs.push(event.coords);
                    const markerHtml = `<div style="background-color: ${dayInfo.color}; width: 26px; height: 26px; border-radius: 50%; border: 3px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 11px;">${i + 1}</div>`;
                    const customIcon = L.divIcon({ className: 'custom-div-icon', html: markerHtml, iconSize: [26, 26], iconAnchor: [13, 13] });
                    const marker = L.marker(event.coords, {icon: customIcon}).addTo(markersGroup);
                    marker.bindPopup(`<div class="font-bold text-sm mb-1 pb-1 border-b" style="color: ${dayInfo.color}">${event.time} ｜ ${event.location}</div><div class="text-xs text-gray-700 leading-relaxed">${event.desc}</div>`);

                    itemDiv.querySelector('.itinerary-card').onclick = () => {
                        document.querySelectorAll('.itinerary-card').forEach(c => c.classList.remove('active'));
                        document.getElementById(`card-${i}`).classList.add('active');
                        map.flyTo(event.coords, 14, { duration: 1.2 });
                        marker.openPopup();
                    };
                    
                    marker.on('click', () => {
                        document.querySelectorAll('.itinerary-card').forEach(c => c.classList.remove('active'));
                        const card = document.getElementById(`card-${i}`);
                        card.classList.add('active');
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    });
                }
                listContainer.appendChild(itemDiv);
            });

            if (latlngs.length > 1) {
                polyline = L.polyline(latlngs, { color: dayInfo.color, weight: 3, opacity: 0.6, dashArray: '6, 8', lineJoin: 'round' }).addTo(map);
            }
            if (latlngs.length > 0) {
                map.flyToBounds(L.latLngBounds(latlngs), { padding: [50, 50], duration: 1 });
            }
        }

        function selectDay(index) {
            activeDayIndex = index;
            renderDaySelector();
            renderItineraryAndMap(index);
            document.getElementById('itinerary-list').scrollTop = 0;
        }
        
</script>
</body>
</html>
